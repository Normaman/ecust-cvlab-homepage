title: 华东理工大学 计算机视觉与人工智能课题组
subtitle: Academic Group Homepage
labShortName: ECUST CVAI Lab
about:
  - 项目团队在计算机视觉、人工智能、图像视频处理、计算机图形学等领域深耕，在 IEEE TPAMI, TIP, TNNLS, TCYB, TCSVT, TGRS 等顶级和权威国内外期刊会议上发表论文 120 余篇；主持军工项目以及企业合作等各类项目 10 余项（其中国家级项目 8 项），获得省部级二等奖。
  - 课题组聚焦基础研究与实际应用协同推进，面向图像复原、目标检测、多模态智能、AIGC 安全与三维视觉等关键方向持续开展研究。
