items:
  - title: 图像复原与增强
    description: 图像/视频雨雾去除、多天气复原、低光照增强等，面向复杂环境下的视觉质量提升与稳定感知。
    image: /images/research/图像增强.png

  - title: 目标检测与识别
    description: 遥感目标检测、红外小目标检测、自动泊车系统等，覆盖真实应用场景中的目标定位、识别与跟踪。
    image: /images/research/目标检测.png

  - title: 模型与数据轻量化
    description: 神经网络架构搜索、数据集蒸馏等，服务于高效模型设计、快速训练与资源受限部署。
    image: /images/research/数据蒸馏.png

  - title: AIGC 检测
    description: 人工智能生成图像双重对齐检测等，关注生成内容的真实性判别、泛化能力与安全应用。
    image: /images/research/AIGC检测.png

  - title: 三维视觉
    description: 多源异构传感器时空标定、大尺度复杂场景定位与建图等，支撑高精度环境理解与空间智能表达。
    image: /images/research/3D视觉.png
