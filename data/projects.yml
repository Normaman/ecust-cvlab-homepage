- title: 面向复杂环境的视觉感知与目标检测关键技术
  sponsor: 国家自然科学基金面上项目
  period: 2023 - 2026
  summary: 围绕复杂光照、遮挡与小目标场景下的鲁棒检测与识别开展研究，服务于智能装备与场景理解任务。

- title: AIGC 图像真实性判别与泛化检测
  sponsor: 国家级科研项目
  period: 2024 - 2027
  summary: 面向人工智能生成图像检测中的跨域泛化与鲁棒性难题，构建双重对齐检测框架与评测方法。

- title: 大尺度复杂场景定位与建图
  sponsor: 装备预研项目
  period: 2022 - 2025
  summary: 研究多源异构传感器联合建图、时空标定与渲染理解技术，支撑复杂场景下的三维视觉感知。
